<!DOCTYPE html>
<html lang="pt-br">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App de Entregas</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:20px}
.header{padding:12px;text-align:center;font-weight:bold;font-size:22px}
.tabs{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
background:#fff;
border-top:1px solid #ccc;
padding-bottom: max(10px, env(safe-area-inset-bottom));
z-index:1000;
}
.tab{
flex:1;
padding:16px;
text-align:center;
cursor:pointer;
font-size:17px;
}
.active{font-weight:bold}
.container{
padding:12px;
padding-bottom:140px;
}
.card{background:#fff;padding:14px;margin-bottom:12px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);font-size:18px}
button{margin-top:8px;padding:10px;border:none;border-radius:10px;cursor:pointer;font-size:16px}
.add{position:fixed;bottom:90px;right:20px;width:60px;height:60px;border-radius:50%;font-size:28px}
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
display:none;
flex-direction:column;
padding:12px;

/* 🔥 NOVO */
z-index:9999;
}
input,textarea{width:100%;padding:12px;margin:6px 0;font-size:18px}
.success{color:green;font-weight:bold}
.danger{color:red;font-weight:bold}
</style>
</head>
<body>
<div class="header">App de Entregas</div>
<div id="app" class="container"></div>

<button class="add" onclick="openModal()">+</button>

<div class="tabs">
<div class="tab active" onclick="setTab('pedidos')">Pedidos</div>
<div class="tab" onclick="setTab('ferramenta')">Adicionar</div>
<div class="tab" onclick="setTab('historico')">Histórico</div>
</div>

<div id="modal" class="modal">
<h3>Pedido</h3>
<input id="id" placeholder="ID (8 números)" inputmode="numeric" maxlength="8" oninput="this.value=this.value.replace(/\D/g,'').slice(0,8)">
<input id="nome" placeholder="Nome">
<input id="numero" placeholder="Número">
<input id="apto" placeholder="Apartamento">
<input id="valor" placeholder="Valor R$" inputmode="decimal" oninput="this.value=this.value.replace(/[^0-9.]/g,'')">
<button onclick="savePedido()">Salvar</button>
<button onclick="closeModal()">Fechar</button>
</div>

<div id="iframeModal" class="modal">
<button onclick="fecharIframe()">Fechar</button>

<button onclick="reabrirIfood()" style="background:#ff3b30">
Ir para confirmação novamente
</button>

<iframe id="iframe" style="flex:1;border:none"></iframe>
</div>

<script>
let pedidos = JSON.parse(localStorage.getItem('pedidos')||'[]')
let historico = JSON.parse(localStorage.getItem('historico')||'[]')
let tab = 'pedidos'
let editIndex = null

function saveLocal(){
localStorage.setItem('pedidos',JSON.stringify(pedidos))
localStorage.setItem('historico',JSON.stringify(historico))
}

function setTab(t){tab=t;render()}

function render(){
let app=document.getElementById('app')
app.innerHTML=''

if(tab==='pedidos'){
let rotaBtn=document.createElement('button')
rotaBtn.innerText='Iniciar Rota'

rotaBtn.onclick=()=>{

let lista = pedidos
.filter(p => p.endereco && p.numero)
.map(p => `${p.endereco} ${p.numero} ${p.bairro || ''}`)

if(lista.length === 0){
alert('Nenhum endereço válido')
return
}

// último destino
let destinoFinal = lista[lista.length - 1]

// intermediários
let waypoints = lista.slice(0, -1).join('|')

// 🔥 origem automática = sua localização
let url = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoFinal)}&waypoints=${encodeURIComponent(waypoints)}`

window.open(url, '_blank')
}

// ✅ agora está no lugar certo
app.appendChild(rotaBtn)

pedidos.forEach((p,i)=>{
let div=document.createElement('div')
div.className='card'

let tipo = p.id.length===8 ? '<span class="danger">IFOOD</span>' : 'DA CASA'
let pagamento = p.valor ? `<span class="danger">${p.valor}</span>` : '<span class="success">PAGO</span>'
let apto = p.apto || 'CASA'

div.innerHTML=`
<b>PEDIDO:</b> ${tipo}<br>
<b>NOME:</b> ${p.nome}<br>
${p.endereco?`<b>ENDEREÇO:</b> ${p.endereco}<br>`:''}
${p.numero?`<b>NUMERO:</b> ${p.numero}<br>`:''}
${p.bairro?`<b>BAIRRO:</b> ${p.bairro}<br>`:''}
<b>APARTAMENTO:</b> ${apto}<br>
<b>PAGAMENTO:</b> ${pagamento}<br>
<button onclick="confirmar(${i})">Confirmar</button>
<button onclick="editar(${i})">Editar</button>
${p.endereco && p.numero ? 
`<button onclick="abrirMaps(${i})">Abrir no Google Maps</button>` 
: ''}
`
app.appendChild(div)
})
}

if(tab==='historico'){

// botão zerar histórico
let btn=document.createElement('button')
btn.innerText='Zerar histórico'

btn.onclick=()=>{
if(confirm('Tem certeza que deseja apagar todo o histórico?')){
historico=[]
saveLocal()
render()
}
}

app.appendChild(btn)

// lista
historico.forEach(p=>{
let div=document.createElement('div')
div.className='card'

div.innerHTML=`
<b>NOME:</b> ${p.nome}<br>
${p.endereco?`<b>ENDEREÇO:</b> ${p.endereco}, ${p.numero}<br>`:''}
${p.bairro?`<b>BAIRRO:</b> ${p.bairro}<br>`:''}
${p.id?`<b>PEDIDO:</b> ${p.id.length===8 ? '<span class="danger">IFOOD</span>' : 'DA CASA'}<br>`:''}
`

app.appendChild(div)
})

}

if(tab==='ferramenta'){
let textarea=document.createElement('textarea')
let btn=document.createElement('button')
btn.innerText='Adicionar Pedido'

btn.onclick=()=>{
let txt=textarea.value

let linhas=txt.split('\n').map(l=>l.trim()).filter(l=>l)

// 🔍 NOME (primeira linha válida sem número)
let nome = linhas.find(l => !/\d/.test(l) && l.length > 3) || ''

// 🔍 ENDEREÇO (linha com número + rua/av)
let linhaEndereco = linhas.find(l =>
/(rua|av|avenida|r\.)/i.test(l) && /\d+/.test(l)
) || ''

// 🧠 REGEX MAIS FORTE
let match = linhaEndereco.match(/([A-Za-zÀ-ú.\s]+),\s?(\d+)\s?-?\s?([A-Za-zÀ-ú\s]*)/)

let endereco='', numero='', bairro=''

if(match){
endereco = match[1]
.replace(/^R\./i,'Rua')
.replace(/^Av\./i,'Avenida')
.trim()

numero = match[2]

bairro = match[3].trim()
}

// 🔍 CASO O BAIRRO VENHA EM OUTRA LINHA
if(!bairro){
let linhaBairro = linhas.find(l =>
!/^\d+$/.test(l) &&
!/rua|av|avenida/i.test(l) &&
l.length > 3 &&
l.includes(',')
)

if(linhaBairro){
bairro = linhaBairro.split(',')[0].trim()
}
}

// 🔍 APARTAMENTO
let aptoMatch = txt.match(/(apto|apart|casa)\s?(\d+)/i)
let apto = aptoMatch ? aptoMatch[2] : ''

// 🔍 PAGAMENTO
let valorMatch = txt.match(/(\d+[\.,]\d+)/)
let valor = valorMatch ? valorMatch[1].replace(',','.') : ''

// 🔍 ID IFOOD (8 números após "ID:")
let idMatch = txt.match(/id[:\s]*([0-9]{8})/i)
let id = idMatch ? idMatch[1] : ''

// 🚀 SALVA CERTO AGORA
pedidos.unshift({
id:'',
nome,
endereco,
numero,
bairro,
apto,
valor
})

saveLocal()
render()
}

let wrapper = document.createElement('div')
wrapper.style.display = 'flex'
wrapper.style.flexDirection = 'column'
wrapper.style.alignItems = 'center'
wrapper.style.justifyContent = 'center'
wrapper.style.height = '60vh'
wrapper.style.gap = '12px'

textarea.style.maxWidth = '500px'
textarea.style.width = '100%'
textarea.style.height = '150px'
textarea.style.resize = 'none'

btn.style.width = '80%'
btn.style.maxWidth = '400px'
btn.style.padding = '16px'
btn.style.fontSize = '18px'
btn.style.fontWeight = 'bold'

wrapper.appendChild(textarea)
wrapper.appendChild(btn)

app.appendChild(wrapper)

}
}

function openModal(){
if(editIndex===null){
document.getElementById('id').value=''
document.getElementById('nome').value=''
document.getElementById('numero').value=''
document.getElementById('apto').value=''
document.getElementById('valor').value=''
}
document.getElementById('modal').style.display='flex'
}

function closeModal(){
document.getElementById('modal').style.display='none'
editIndex=null
}

function savePedido(){

let antigo = editIndex !== null ? pedidos[editIndex] : {}

let p = {
id: document.getElementById('id').value,
nome: document.getElementById('nome').value,
numero: document.getElementById('numero').value,
apto: document.getElementById('apto').value,
valor: document.getElementById('valor').value,

// 🔥 MANTÉM OS DADOS ANTIGOS
endereco: antigo.endereco || '',
bairro: antigo.bairro || ''
}

if(editIndex!==null){
pedidos[editIndex] = p
editIndex = null
}else{
pedidos.unshift(p)
}

saveLocal()
closeModal()
render()
}

function editar(i){
let p=pedidos[i]
document.getElementById('id').value=p.id
document.getElementById('nome').value=p.nome
document.getElementById('numero').value=p.numero
document.getElementById('apto').value=p.apto
document.getElementById('valor').value=p.valor
editIndex=i
openModal()
}

function confirmar(i){
let p=pedidos[i]

if(p.id.length===8){

// copia ID
navigator.clipboard.writeText(p.id)

// guarda índice do pedido atual
window.pedidoAtual = i

// abre iframe
document.getElementById('iframe').src =
'https://confirmacao-entrega-propria.ifood.com.br/numero-pedido'

document.getElementById('iframeModal').style.display='flex'

return
}

// pedido da casa
if(confirm('Pedido concluído?')){
historico.unshift(p)
pedidos.splice(i,1)
saveLocal()
render()
}
}

function fecharIframe(){

document.getElementById('iframeModal').style.display='none'

if(confirm('Pedido concluído?')){

let i = window.pedidoAtual
let p = pedidos[i]

historico.unshift(p)
pedidos.splice(i,1)

saveLocal()
render()
}
}

function reabrirIfood(){
document.getElementById('iframe').src =
'https://confirmacao-entrega-propria.ifood.com.br/numero-pedido'
}

function abrirMaps(i){
let p = pedidos[i]

let endereco = `${p.endereco} ${p.numero} ${p.bairro || ''}`

// abre no maps
window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`,'_blank')
}

render()
</script>
</body>
<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js')
}
</script>
</html>
