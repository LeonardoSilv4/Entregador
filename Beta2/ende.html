<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extrator de Endereços</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:20px}
.container{padding:15px}
textarea{width:100%;padding:12px;font-size:18px;margin-bottom:10px}
button{padding:12px;width:100%;font-size:18px;border:none;border-radius:10px;background:#007aff;color:white}
.card{background:#fff;padding:15px;margin-top:10px;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);cursor:pointer}
.alert{margin-top:10px;color:green;font-weight:bold;text-align:center}
</style>
</head>
<body>
<div class="container">
<h2>Extrair Endereço</h2>
<textarea id="input" placeholder="Cole o pedido aqui..."></textarea>
<button onclick="extrair()">Extrair</button>
<div id="alert"></div>
<div id="lista"></div>
</div>

<script>
function extrair(){
let txt = document.getElementById('input').value

let linhas = txt.split('\n')

let linhaEndereco = linhas.find(l =>
/(rua|av|avenida)/i.test(l) && /\d+/.test(l)
)

if(linhaEndereco){

let endereco = linhaEndereco
.replace(/endereço de entrega/i,'')
.replace(/pedido/i,'')
.trim()

let match = endereco.match(/([A-Za-zÀ-ú\.\s]+,\s?\d+\s?-\s?[A-Za-zÀ-ú\s]+)/)
         || endereco.match(/([A-Za-zÀ-ú\.\s]+,\s?\d+)/)

if(match){
let resultado = match[1].trim()

let card=document.createElement('div')
card.className='card'
card.innerText=resultado

card.onclick=()=>{
navigator.clipboard.writeText(resultado)
mostrarAlerta('📋 Copiado!')
}

document.getElementById('lista').appendChild(card)
}
}
}

function mostrarAlerta(msg){
let alertDiv=document.getElementById('alert')
alertDiv.innerText=msg
setTimeout(()=>{alertDiv.innerText=''},1500)
}
</script>
</body>
</html>
